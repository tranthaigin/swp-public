<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Profile Settings</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<main class="profile-settings-wrapper">
    <div class="container">

        <header class="d-flex flex-wrap justify-content-between align-items-center mb-4">
            <div class="welcome-text">
                <h1 class="h3 fw-medium text-dark mb-1">
                    Welcome, <span th:text="${user.username}">UserName</span>
                </h1>
                <time class="text-muted fw-light small"
                      th:text="${#calendars.format(#calendars.createNow(), 'EEE, dd MMMM yyyy')}">
                </time>
            </div>

            <nav class="d-flex gap-3">
                <a th:href="@{/}" class="nav-btn" data-bs-title="Home">
                    <i class="bi bi-house"></i>
                </a>

                <a th:href="@{/customer/shopping-cart}" class="nav-btn" data-bs-title="Shopping Cart">
                    <i class="bi bi-bag"></i>
                </a>

                <button class="nav-btn"><i class="bi bi-bell"></i></button>

                <div class="nav-item">
                    <img class="nav-avatar" th:src="@{/images/logo-petshop.png}" alt="User avatar">
                </div>
            </nav>
        </header>

        <div class="card main-card">

            <div class="banner-container"></div>

            <div class="profile-header-info">

                <img class="avatar-large" th:src="@{/images/logo-petshop.png}" alt="Profile">

                <div class="d-flex flex-wrap align-items-center justify-content-between user-info-text">

                    <div>
                        <h2 class="h4 fw-medium mb-1" th:text="${user.username}"></h2>
                        <p class="text-muted mb-0" th:text="${user.email}"></p>
                    </div>

                    <div class="d-flex gap-3 mt-3 mt-md-0">
                        <a th:if="${hasPassword}" th:href="@{/profile/change-password}" class="btn btn-yellow">Change
                            password</a>
                        <a th:href="@{/profile/edit}" class="btn btn-blue">Edit</a>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <form>
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label" for="fullName">Full Name</label>
                            <input class="form-control" type="text" id="fullName" name="fullName"
                                   th:value="${user.fullName}" readonly>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label" for="userName">User name</label>
                            <input class="form-control" type="text" id="userName" name="userName"
                                   th:value="${user.username}" readonly>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label" for="phone">Phone</label>
                            <input class="form-control" type="tel" id="phone" name="phone"
                                   th:value="${user.phone}" readonly>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label" for="joinedDate">Joined Date</label>
                            <input class="form-control" type="text" id="joinedDate"
                                   th:value="${user.createdAt != null ? #temporals.format(user.createdAt, 'dd-MM-yyyy') : 'N/A'}"
                                   readonly>
                        </div>
                    </div>

                    <div class="email-section mt-4">
                        <h3 class="h6 fw-medium mb-3">My email Address</h3>
                        <div class="d-flex align-items-center gap-3">
                            <div class="email-icon-box">
                                <i class="bi bi-envelope-fill"></i>
                            </div>
                            <div>
                                <span class="d-block text-dark fw-medium" th:text="${user.email}"></span>
                                <small class="badge bg-success">Verified Customer</small>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const tooltipTriggerList = document.querySelectorAll('[data-bs-title]');
        const tooltipList = [...tooltipTriggerList].map(tooltipTriggerEl => new bootstrap.Tooltip(tooltipTriggerEl));
    });
</script>
</body>
</html>
