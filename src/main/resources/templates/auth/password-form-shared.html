<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${formMode == 'CHANGE' ? 'Change Password' : 'Reset Password'}">Password Page</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<main class="page-change-password-wrapper">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-8">
                <div class="card-custom">

                    <div class="card-header-custom">
                        <div class="icon-wrapper">
                            <i class="bi bi-shield-lock" style="font-size: 1.5rem; color: white;"></i>
                        </div>
                        <h2 th:text="${formMode == 'CHANGE' ? 'Change Password' : 'Reset Password'}">Password
                            Management</h2>
                        <p th:if="${formMode == 'RESET_OTP'}" class="text-white-50">Please enter the 6-digit code sent
                            to your email.</p>
                    </div>

                    <div class="card-body p-4 p-md-5">

                        <div th:if="${error}" class="alert alert-danger" role="alert" th:text="${error}"></div>
                        <div th:if="${message}" class="alert alert-success" role="alert" th:text="${message}"></div>

                        <form method="post" class="needs-validation"
                              th:action="${formMode == 'CHANGE' ? '/profile/change-password' : '/reset-password'}"
                              novalidate>

                            <div class="row g-3 mb-4" th:if="${formMode == 'CHANGE'}">
                                <div class="col-12">
                                    <label class="form-label text-muted small uppercase fw-bold">User
                                        Information</label>
                                    <input type="text" class="form-control bg-light"
                                           th:value="${user != null ? user.username : ''}" readonly>
                                </div>
                                <div class="col-md-6">
                                    <input type="email" class="form-control bg-light"
                                           th:value="${user != null ? user.email : ''}" readonly>
                                </div>
                                <div class="col-md-6">
                                    <input type="tel" class="form-control bg-light"
                                           th:value="${user != null ? user.phone : ''}" readonly>
                                </div>
                                <hr class="my-4 opacity-25">
                            </div>

                            <div class="mb-4">
                                <div class="mb-4" th:if="${formMode == 'RESET_OTP'}">
                                    <label for="otp" class="form-label">Verification OTP <span
                                            class="text-danger">*</span></label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-white"><i class="bi bi-key"></i></span>
                                        <input type="text" class="form-control border-start-0" id="otp" name="otp"
                                               placeholder="Enter 6-digit code"
                                               required maxlength="6" pattern="[0-9]{6}">
                                        <div class="invalid-feedback">Please enter the valid 6-digit OTP code.</div>
                                    </div>
                                    <div class="form-text">Check your email inbox for the code.</div>
                                </div>

                                <div class="mb-3" th:if="${formMode == 'CHANGE'}">
                                    <label for="oldPassword" class="form-label">Old Password <span
                                            class="text-danger">*</span></label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-white"><i class="bi bi-lock"></i></span>
                                        <input type="password" class="form-control border-start-0 border-end-0"
                                               id="oldPassword"
                                               name="oldPassword" placeholder="Current password" required>
                                        <button class="btn btn-outline-secondary toggle-password border-start-0 bg-white"
                                                type="button">
                                            <i class="bi bi-eye"></i>
                                        </button>
                                        <div class="invalid-feedback">Current password is required.</div>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="newPassword" class="form-label">New Password <span
                                            class="text-danger">*</span></label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-white"><i class="bi bi-shield-plus"></i></span>
                                        <input type="password" class="form-control border-start-0 border-end-0"
                                               id="newPassword"
                                               name="newPassword" placeholder="Minimum 8 characters" minlength="8"
                                               required>
                                        <button class="btn btn-outline-secondary toggle-password border-start-0 bg-white"
                                                type="button">
                                            <i class="bi bi-eye"></i>
                                        </button>
                                        <div class="invalid-feedback">Password must be at least 8 characters long.</div>
                                    </div>
                                </div>

                                <div class="mb-4">
                                    <label for="confirmPassword" class="form-label">Confirm New Password <span
                                            class="text-danger">*</span></label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-white"><i
                                                class="bi bi-shield-check"></i></span>
                                        <input type="password" class="form-control border-start-0 border-end-0"
                                               id="confirmPassword"
                                               name="confirmPassword" placeholder="Repeat new password" required>
                                        <button class="btn btn-outline-secondary toggle-password border-start-0 bg-white"
                                                type="button">
                                            <i class="bi bi-eye"></i>
                                        </button>
                                        <div class="invalid-feedback">Please confirm your new password.</div>
                                    </div>
                                </div>
                            </div>

                            <div class="d-flex gap-3 pt-3 border-top">
                                <button type="submit" class="btn btn-primary flex-grow-1 py-2 fw-bold"
                                        th:text="${formMode == 'CHANGE' ? 'Save Changes' : 'Reset Password'}">
                                    Action
                                </button>

                                <a th:href="@{/profile}" class="btn btn-outline-secondary flex-grow-1 py-2"
                                   th:if="${formMode == 'CHANGE'}">Cancel</a>
                                <a th:href="@{/login}" class="btn btn-outline-secondary flex-grow-1 py-2"
                                   th:if="${formMode == 'RESET_OTP'}">Back to Login</a>
                            </div>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script th:src="@{/js/password-form-shared.js}"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
