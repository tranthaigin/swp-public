<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Edit Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;500;600&family=Poppins:wght@300;400;500&display=swap"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<main class="edit-profile-wrapper">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-8">
                <div class="card-custom">

                    <div class="card-header-custom">
                        <h2>Profile Settings</h2>
                        <p>Manage your personal information and preferences</p>
                    </div>

                    <div class="card-body p-4">

                        <div class="avatar-section">
                            <div class="avatar-circle">
                                <span th:text="${#strings.substring(user.fullName, 0, 1)}"></span>
                            </div>
                        </div>

                        <form th:action="@{/profile/do-edit}" method="post" th:object="${user}" class="needs-validation"
                              novalidate>

                            <div th:if="${error}" class="alert alert-danger" role="alert">
                                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                                <span th:text="${error}">Error message</span>
                            </div>

                            <div class="row g-4">
                                <div class="col-md-6">
                                    <label class="form-label">Full Name <span class="text-danger">*</span></label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                                        <input type="text" class="form-control" th:field="*{fullName}"
                                               required minlength="2" maxlength="50"
                                               pattern="^[a-zA-ZÀ-ỹ\s]+$"
                                               th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid' : ''">
                                        <div class="invalid-feedback">
                                            Please enter a valid name (letters and spaces only, no numbers).
                                        </div>
                                    </div>
                                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('fullName')}"
                                         th:errors="*{fullName}"></div>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label">User Name</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
                                        <input type="text" class="form-control text-muted" th:field="*{username}"
                                               readonly
                                               style="background-color: #e9ecef; cursor: not-allowed;">
                                    </div>
                                </div>

                                <div class="col-12">
                                    <label class="form-label" for="email">Email <span
                                            class="text-danger">*</span></label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                        <input type="email" class="form-control" id="email" th:field="*{email}"
                                               required
                                               th:readonly="${isGoogleUser}"
                                               th:style="${isGoogleUser} ? 'background-color: #e9ecef; cursor: not-allowed;' : ''"
                                               th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''">
                                        <div class="invalid-feedback">
                                            Please enter a valid email address.
                                        </div>
                                    </div>
                                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}"
                                         th:errors="*{email}"></div>
                                    <div th:if="${isGoogleUser}" class="form-text text-muted small">
                                        <i class="bi bi-info-circle"></i> Google-linked accounts cannot change their
                                        email address.
                                    </div>
                                </div>

                                <div class="col-12">
                                    <label class="form-label" for="phone">Phone <span
                                            class="text-danger">*</span></label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                                        <input type="tel" class="form-control" id="phone" th:field="*{phoneNumber}"
                                               required pattern="^(0[3|5|7|8|9])+([0-9]{8})$" maxlength="10"
                                               th:classappend="${#fields.hasErrors('phoneNumber')} ? 'is-invalid' : ''">
                                        <div class="invalid-feedback">
                                            Please enter a valid 10-digit phone number.
                                        </div>
                                    </div>
                                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('phoneNumber')}"
                                         th:errors="*{phoneNumber}"></div>
                                </div>

                                <div class="col-12 mt-4 d-flex gap-3">
                                    <button type="submit" class="btn btn-primary btn-save px-4">
                                        <i class="bi bi-check2-circle me-1"></i> Save Changes
                                    </button>
                                    <a th:href="@{/profile}" class="btn btn-secondary btn-cancel px-4">Cancel</a>
                                </div>

                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/editProfile.js}"></script>

</body>
</html>
