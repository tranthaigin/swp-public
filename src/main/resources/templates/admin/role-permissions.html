<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Role Permissions</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/role-permissions.css}">
</head>
<body class="bg-light pt-5">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-md-10">

            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show shadow-sm"
                 role="alert">
                <i class="bi bi-check-circle-fill me-2"></i> <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i> <span th:text="${errorMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <div class="card shadow border-0">
                <div class="card-header card-header-theme d-flex justify-content-between align-items-center py-3">
                    <h5 class="mb-0">
                        Manage Permissions: <span class="badge bg-white text-dark ms-2"
                                                  th:text="${rolePermissionDTO.roleName}">ADMIN</span>
                    </h5>
                </div>

                <div class="card-body p-4">
                    <form id="permissionForm" th:action="@{/admin/roles/permissions/update}"
                          th:object="${rolePermissionDTO}" method="POST">

                        <input type="hidden" th:field="*{roleId}"/>
                        <p class="text-muted mb-4">Select the modules and actions this role is allowed to access.</p>

                        <div class="row">
                            <div class="col-md-6" th:each="perm, stat : *{permissions}">
                                <div class="permission-box form-check d-flex align-items-center">
                                    <input type="hidden" th:field="*{permissions[__${stat.index}__].permissionCode}"/>

                                    <input class="form-check-input mt-0 fs-5 me-3" type="checkbox"
                                           th:field="*{permissions[__${stat.index}__].isAllowed}"
                                           th:id="'check_' + ${stat.index}">

                                    <label class="form-check-label mb-0 fw-bold text-dark" style="cursor: pointer;"
                                           th:for="'check_' + ${stat.index}"
                                           th:text="${perm.permissionCode}">
                                    </label>
                                </div>
                            </div>
                        </div>

                        <hr class="my-4">

                        <div class="d-flex justify-content-end gap-2">
                            <a th:href="@{/admin/roles}" class="btn btn-outline-theme px-4">Cancel</a>
                            <button type="submit" class="btn btn-theme px-4">Save Permissions</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/js/role-permissions.js}"></script>

</body>
</html>
