<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointment Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Reuse admin dashboard styling for consistent UI -->
    <link rel="stylesheet" th:href="@{/css/admin-dashboard.css}"/>
    <link rel="stylesheet" th:href="@{/css/sidebar-admin.css}">

    <style>
        .btn-orange {
            background-color: var(--primary-orange);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 6px 16px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            text-decoration: none;
        }

        .btn-orange:hover {
            background-color: #e89445;
            color: #fff;
            transform: translateY(-1px);
        }

        .btn-view {
            background-color: #f8f9fa;
            color: #2463eb;
            border: 1px solid #eef0f2;
            border-radius: 8px;
            padding: 6px 10px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        .btn-view:hover {
            background-color: #eceef1;
            transform: translateY(-1px);
            color: #1d4ed8;
        }

        .action-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }

        .table-card {
            padding: 30px;
        }

        .badge-status {
            min-width: 100px;
            text-align: center;
            padding: 6px 12px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 12px;
            display: inline-block;
        }

        .status-pending {
            background-color: #fff3cd;
            color: #856404;
        }

        .status-confirmed {
            background-color: #d1ecf1;
            color: #0c5460;
        }

        .status-checked_in {
            background-color: #d1ecf1;
            color: #0c5460;
        }

        .status-in_progress {
            background-color: #cce5ff;
            color: #004085;
        }

        .status-done {
            background-color: #d4edda;
            color: #155724;
        }

        .status-canceled {
            background-color: #f8d7da;
            color: #721c24;
        }

        .status-no_show {
            background-color: #f8d7da;
            color: #721c24;
        }

        .btn-export {
            background-color: #198754;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 6px 16px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            text-decoration: none;
        }

        .btn-export:hover {
            background-color: #157347;
            color: #fff;
            transform: translateY(-1px);
        }

        .filter-section {
            background-color: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
            margin-bottom: 24px;
        }
    </style>
</head>
<body>
<!-- ... Navbar ... -->

<div class="d-flex">
    <div th:replace="~{fragments/sidebar-admin :: aside(activePage='appointments')}"></div>

    <div class="container-fluid py-4 px-md-5">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
            <h2 class="fw-bold mb-0">Manage Appointments</h2>
            <div class="d-flex gap-2">
                <a th:href="@{/admin/appointments/export(status=${filter != null ? filter.status : ''}, fromDate=${filter != null ? filter.fromDate : ''}, toDate=${filter != null ? filter.toDate : ''}, keyword=${filter != null ? filter.keyword : ''})}"
                   class="btn-export">
                    <i class="bi bi-file-earmark-excel"></i> Export Excel
                </a>
                <a th:href="@{/admin/dashboard}" class="btn btn-primary d-flex align-items-center gap-2">
                    <i class="bi bi-arrow-left"></i> Back to Dashboard
                </a>
            </div>
        </div>

        <div class="filter-section">
            <form th:action="@{/admin/appointments}" method="get" class="row g-3">
                <div class="col-md-3">
                    <label class="form-label small fw-bold">Keyword</label>
                    <input type="text" name="keyword" th:value="${filter?.keyword}" class="form-control"
                           placeholder="Code, Customer, Pet ID...">
                </div>
                <div class="col-md-2">
                    <label class="form-label small fw-bold">Status</label>
                    <select name="status" class="form-select">
                        <option value="">All Status</option>
                        <option value="pending" th:selected="${filter?.status == 'pending'}">Pending</option>
                        <option value="confirmed" th:selected="${filter?.status == 'confirmed'}">Confirmed</option>
                        <option value="in_progress" th:selected="${filter?.status == 'in_progress'}">In Progress
                        </option>
                        <option value="done" th:selected="${filter?.status == 'done'}">Done</option>
                        <option value="canceled" th:selected="${filter?.status == 'canceled'}">Canceled</option>
                        <option value="no_show" th:selected="${filter?.status == 'no_show'}">No Show</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label small fw-bold">From Date</label>
                    <input type="date" name="fromDate" th:value="${filter?.fromDate}" class="form-control">
                </div>
                <div class="col-md-2">
                    <label class="form-label small fw-bold">To Date</label>
                    <input type="date" name="toDate" th:value="${filter?.toDate}" class="form-control">
                </div>
                <div class="col-md-3 d-flex align-items-end gap-2">
                    <button type="submit" class="btn btn-primary flex-grow-1">
                        <i class="bi bi-filter"></i> Filter
                    </button>
                    <a th:href="@{/admin/appointments}" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-clockwise"></i>
                    </a>
                </div>
            </form>
        </div>

        <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${message}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <!-- Pagination -->
        <nav th:if="${totalPages > 1}" class="d-flex justify-content-end mb-3">
            <ul class="pagination pagination-sm mb-0">
                <li class="page-item" th:classappend="${currentPage == 0} ? ' disabled'">
                    <a class="page-link"
                       th:href="@{/admin/appointments(page=${currentPage-1}, size=${filter != null ? filter.size : 10}, status=${filter != null ? filter.status : ''}, fromDate=${filter != null ? filter.fromDate : ''}, toDate=${filter != null ? filter.toDate : ''}, keyword=${filter != null ? filter.keyword : ''})}">Prev</a>
                </li>

                <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages-1)}"
                    th:classappend="${i == currentPage} ? ' active'">
                    <a class="page-link" th:text="${i+1}"
                       th:href="@{/admin/appointments(page=${i}, size=${filter != null ? filter.size : 10}, status=${filter != null ? filter.status : ''}, fromDate=${filter != null ? filter.fromDate : ''}, toDate=${filter != null ? filter.toDate : ''}, keyword=${filter != null ? filter.keyword : ''})}">1</a>
                </li>

                <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? ' disabled'">
                    <a class="page-link"
                       th:href="@{/admin/appointments(page=${currentPage+1}, size=${filter != null ? filter.size : 10}, status=${filter != null ? filter.status : ''}, fromDate=${filter != null ? filter.fromDate : ''}, toDate=${filter != null ? filter.toDate : ''}, keyword=${filter != null ? filter.keyword : ''})}">Next</a>
                </li>
            </ul>
        </nav>

        <div class="table-card">
            <div class="d-flex justify-content-between align-items-center mb-4 header-orange-custom">
                <h4 class="fw-bold mb-0 text-white">Appointments List</h4>
                <span class="text-white-50 small" th:text="${totalItems + ' total appointments'}"></span>
            </div>

            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                    <tr>
                        <th>Appointment Code</th>
                        <th>Customer Name</th>
                        <th>Pet Name</th>
                        <th>Date</th>
                        <th>Status</th>
                        <th class="text-center">Action</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="appt : ${appointments}">
                        <td th:text="${appt.appointmentCode}">CODE</td>
                        <td th:text="${appt.customer != null ? appt.customer.fullName : 'N/A'}">CUSTOMER NAME</td>
                        <td th:text="${appt.pet != null ? appt.pet.name : 'N/A'}">PET NAME</td>
                        <td th:text="${#temporals.format(appt.appointmentDate, 'dd/MM/yyyy')}">DATE</td>
                        <td>
                            <span class="badge-status"
                                  th:classappend="' status-' + ${appt.status != null ? appt.status.toLowerCase() : 'pending'}"
                                  th:text="${appt.status}">pending</span>
                        </td>
                        <td class="text-center">
                            <div class="action-container">
                                <a th:href="@{/admin/appointments/{id}(id=${appt.id})}"
                                   class="btn-view" title="View Detail">
                                    <i class="bi bi-eye"></i>
                                </a>

                                <a th:if="${appt.status == 'pending'}"
                                   th:href="@{/admin/appointments/{id}(id=${appt.id})}"
                                   class="btn-orange" title="Assign Staff">
                                    <i class="bi bi-person-plus-fill"></i>
                                    <span>Assign</span>
                                </a>

                                <form th:if="${appt.status == 'canceled'}"
                                      th:action="@{/admin/appointments/{id}/delete(id=${appt.id})}"
                                      method="post"
                                      onsubmit="return confirm('Are you sure you want to delete this canceled appointment?');"
                                      style="display: inline;">
                                    <button type="submit" class="btn btn-danger btn-sm"
                                            style="border-radius: 8px; padding: 6px 10px;">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
