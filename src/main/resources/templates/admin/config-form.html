<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Configurations Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <link rel="stylesheet" th:href="@{/css/sidebar-admin.css}">
    <link rel="stylesheet" th:href="@{/css/admin-config.css}">

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #f8f9fa;
        }

        .admin-wrapper {
            display: flex;
            min-height: 100vh;
        }

        .admin-main-content {
            flex-grow: 1;
            padding: 2rem;
            height: 100vh;
            overflow-y: auto; /* Cuộn độc lập phần nội dung bên phải */
        }
    </style>
</head>
<body>

<div class="admin-wrapper">

    <div th:replace="~{fragments/sidebar-admin :: aside(activePage='config')}"></div>
    <div class="admin-main-content">
        <div class="container-fluid p-0">

            <div class="d-flex justify-content-between align-items-center mb-4 p-4 rounded-3"
                 style="background-color: #ffedd8;">
                <div>
                    <h2 class="mb-0 fw-bold text-dark">System Configurations</h2>
                </div>
                <div>
                    <a th:href="@{/admin/config/add}"
                       class="btn text-white shadow-sm fw-bold px-4 py-2 rounded-pill d-flex align-items-center gap-2"
                       style="background-color: #0f172a; border: none;">
                        <i class="bi bi-plus-circle"></i> Add New Config
                    </a>
                </div>
            </div>

            <div th:if="${success}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
                <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show shadow-sm"
                 role="alert">
                <i class="fas fa-check-circle me-2"></i>System configurations updated successfully.
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <div class="card border-0 shadow-sm rounded-3 overflow-hidden">
                <form th:action="@{/admin/config/update}" th:object="${configDTO}" method="post" class="m-0">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead style="background-color: #f1f5f9; color: #64748b;"
                                       class="text-uppercase small fw-bold">
                                <tr>
                                    <th class="ps-4 py-3" style="width: 5%;">#</th>
                                    <th class="py-3" style="width: 25%;"><i class="fas fa-key me-1"></i> Config Key</th>
                                    <th class="py-3" style="width: 35%;"><i class="fas fa-edit me-1"></i> Value</th>
                                    <th class="py-3" style="width: 15%;"><i class="fas fa-tag me-1"></i> Data Type</th>
                                    <th class="py-3" style="width: 20%;"><i class="far fa-clock me-1"></i> Last Updated
                                    </th>
                                </tr>
                                </thead>
                                <tbody>

                                <tr th:if="${#lists.isEmpty(configDTO.configs)}">
                                    <td colspan="5" class="text-center py-5">
                                        <div class="empty-state text-muted">
                                            <i class="fas fa-box-open fs-1 mb-3 text-light"></i>
                                            <h5 class="fw-bold text-dark">No configurations found</h5>
                                            <p class="small">Your database is currently empty. Start by adding a new
                                                configuration.</p>
                                            <a th:href="@{/admin/config/add}"
                                               class="btn btn-outline-primary mt-2 rounded-pill px-4">
                                                <i class="fas fa-plus me-1"></i> Create First Config
                                            </a>
                                        </div>
                                    </td>
                                </tr>

                                <tr th:each="config, itemStat : *{configs}" class="border-bottom">
                                    <td class="ps-4 fw-bold text-muted" th:text="${itemStat.count}">1</td>

                                    <td>
                                        <span class="config-key-badge fw-bold text-dark"
                                              th:text="${config.configKey}"></span>
                                        <input type="hidden" th:field="*{configs[__${itemStat.index}__].configKey}"/>
                                    </td>

                                    <td>
                                        <input type="text"
                                               class="form-control shadow-none border-secondary-subtle px-3 py-2"
                                               th:field="*{configs[__${itemStat.index}__].configValue}" required/>
                                    </td>

                                    <td>
                                        <span class="badge px-3 py-2 rounded-pill border"
                                              th:classappend="${config.dataType == 'STRING' ? 'bg-info-subtle text-info border-info' : (config.dataType == 'NUMBER' ? 'bg-warning-subtle text-warning border-warning' : (config.dataType == 'BOOLEAN' ? 'bg-success-subtle text-success border-success' : 'bg-secondary-subtle text-secondary border-secondary'))}"
                                              th:text="${config.dataType}"></span>
                                        <input type="hidden" th:field="*{configs[__${itemStat.index}__].dataType}"/>
                                    </td>

                                    <td>
                                        <div class="text-muted fw-medium" style="font-size: 0.85rem;">
                                            <span th:text="${#temporals.format(config.updatedAt, 'dd/MM/yyyy HH:mm')}"></span>
                                        </div>
                                        <input type="hidden"
                                               th:field="*{configs[__${itemStat.index}__].updatedByStaffId}"/>
                                        <input type="hidden" th:field="*{configs[__${itemStat.index}__].updatedAt}"/>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div class="card-footer bg-light border-top py-3 px-4 d-flex justify-content-end gap-2"
                         th:unless="${#lists.isEmpty(configDTO.configs)}">
                        <button type="reset" class="btn btn-light border rounded-pill px-4 fw-medium">
                            <i class="fas fa-undo me-1"></i> Reset Changes
                        </button>
                        <button type="submit" class="btn text-white rounded-pill px-4 fw-bold shadow-sm"
                                style="background-color: #FFA54F;">
                            <i class="fas fa-save me-1"></i> Save Configurations
                        </button>
                    </div>
                </form>
            </div>

        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/admin-config.js}"></script>

</body>
</html>
