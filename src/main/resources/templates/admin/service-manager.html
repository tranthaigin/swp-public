<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Manager - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/admin-service.css}">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2 me-2"></i>Admin</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" th:href="@{/admin/dashboard}">Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-4 px-4">
        <div class="d-flex align-items-center gap-2 mb-4">
            <a th:href="@{/admin/dashboard}" class="text-secondary text-decoration-none"><i class="bi bi-arrow-left"></i> Back to Dashboard</a>
        </div>
        <h2 class="fw-bold text-dark mb-4">Service Manager</h2>

        <div class="row g-4">
            <div class="col-md-6 col-lg-4">
                <a th:href="@{/admin/service-type}" class="text-decoration-none">
                    <div class="card border-0 shadow-sm h-100 hover-shadow" style="transition: box-shadow 0.2s;">
                        <div class="card-body d-flex align-items-center gap-4">
                            <div class="rounded-3 bg-primary bg-opacity-10 p-3">
                                <i class="bi bi-tags text-primary" style="font-size: 2rem;"></i>
                            </div>
                            <div>
                                <h5 class="card-title fw-bold text-dark mb-1">Manage Service Types</h5>
                                <p class="card-text text-muted small mb-0">View, create, update, or deactivate service types (e.g. Spa, Vaccination, Boarding).</p>
                            </div>
                        </div>
                    </div>
                </a>
            </div>
            <div class="col-md-6 col-lg-4">
                <a th:href="@{/admin/services}" class="text-decoration-none">
                    <div class="card border-0 shadow-sm h-100 hover-shadow" style="transition: box-shadow 0.2s;">
                        <div class="card-body d-flex align-items-center gap-4">
                            <div class="rounded-3 bg-primary bg-opacity-10 p-3">
                                <i class="bi bi-briefcase-medical text-primary" style="font-size: 2rem;"></i>
                            </div>
                            <div>
                                <h5 class="card-title fw-bold text-dark mb-1">Manage Services</h5>
                                <p class="card-text text-muted small mb-0">View, add, update, or deactivate service items (price, duration) and filter by type.</p>
                            </div>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
