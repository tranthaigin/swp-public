<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Service Types - Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">


    <link rel="stylesheet" th:href="@{/css/admin-service.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar-admin.css}">


    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        /* Chống scroll toàn trang */
        .admin-wrapper {
            display: flex;
            min-height: 100vh;
            background-color: #f8f9fa;
        }

        .admin-main-content {
            flex-grow: 1;
            padding: 2rem;
            height: 100vh;
            overflow-y: auto; /* Chỉ scroll phần nội dung bên phải */
        }
    </style>
</head>
<body>

<div class="admin-wrapper">

    <div th:replace="~{fragments/sidebar-admin :: aside(activePage='service-type')}"></div>
    <div class="admin-main-content">

        <div class="d-flex align-items-center gap-2 mb-4">
            <a th:href="@{/admin/service-manager}" class="text-secondary text-decoration-none fw-medium">
                <i class="bi bi-arrow-left"></i> Back to Service Manager
            </a>
        </div>

        <div th:if="${message}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i><span th:text="${message}">Saved.</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}">Error.</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4 bg-white p-3 shadow-sm rounded-3">
            <h3 class="fw-bold text-dark mb-0">Service Types</h3>
            <button type="button" class="btn text-white fw-bold px-4 rounded-pill" style="background-color: #1a202c;"
                    data-bs-toggle="modal" data-bs-target="#serviceTypeModal" id="btnAddNew">
                <i class="bi bi-plus-lg me-1"></i> Add New Type
            </button>
        </div>

        <div class="card border-0 shadow-sm rounded-3 overflow-hidden bg-white">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="text-uppercase small fw-bold" style="background-color: #f1f5f9; color: #64748b;">
                    <tr>
                        <th class="ps-4 py-3">#</th>
                        <th class="py-3">Name</th>
                        <th class="py-3">Description</th>
                        <th class="py-3">Status</th>
                        <th class="text-end pe-4 py-3">Action</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="st, iterStat : ${serviceTypes}" class="border-bottom">
                        <td class="ps-4 fw-bold" th:text="${st.id}">1</td>
                        <td><span class="fw-bold text-dark" th:text="${st.name}">—</span></td>
                        <td><span class="text-muted" th:text="${st.description != null ? st.description : '-'}">—</span>
                        </td>
                        <td>
                            <span th:if="${st.isActive}"
                                  class="badge bg-success-subtle text-success border border-success px-3 py-2 rounded-pill">Active</span>
                            <span th:unless="${st.isActive}"
                                  class="badge bg-secondary-subtle text-secondary border border-secondary px-3 py-2 rounded-pill">Inactive</span>
                        </td>
                        <td class="text-end pe-4">
                            <a th:href="@{/admin/service-type(editId=${st.id})}"
                               class="btn btn-sm btn-outline-secondary me-2 rounded-pill px-3" role="button">
                                <i class="bi bi-pencil-square"></i> Edit
                            </a>
                            <th:block th:if="${st.isActive}">
                                <form th:action="@{/admin/service-type/delete/{id}(id=${st.id})}" method="post"
                                      class="d-inline" th:data-name="${st.name}"
                                      onsubmit="return confirm('Delete this service type?');">
                                    <button type="submit" class="btn btn-sm btn-outline-danger rounded-pill px-3"><i
                                            class="bi bi-trash"></i> Delete
                                    </button>
                                </form>
                            </th:block>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(serviceTypes)}">
                        <td colspan="5" class="text-center text-muted py-5">
                            <i class="bi bi-inbox fs-1 d-block mb-2 text-light"></i>
                            No service types yet. Click "Add New Type" to create one.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>
<div class="modal fade" id="serviceTypeModal" tabindex="-1" aria-labelledby="serviceTypeModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header text-white" style="background-color: #FFA54F;">
                <h5 class="modal-title fw-bold" id="serviceTypeModalLabel"
                    th:text="${serviceType.id != null} ? 'Edit Service Type' : 'Add New Type'">Add New Type</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                        aria-label="Close"></button>
            </div>
            <form th:action="@{/admin/service-type/save}" method="post" th:object="${serviceType}">
                <div class="modal-body p-4">
                    <input type="hidden" th:field="*{id}" id="formId"/>
                    <div th:if="${#fields.hasErrors('*')}" class="alert alert-danger py-2">
                        <ul class="mb-0 list-unstyled small">
                            <li th:each="err : ${#fields.errors('*')}" th:text="${err}">Error</li>
                        </ul>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Name <span class="text-danger">*</span></label>
                        <input type="text" class="form-control px-3 py-2" th:field="*{name}"
                               placeholder="e.g. Grooming, Spa, Vaccination" required maxlength="80"/>
                        <div th:if="${#fields.hasErrors('name')}" class="text-danger small mt-1" th:errors="*{name}">
                            Name error
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Description</label>
                        <textarea class="form-control px-3 py-2" th:field="*{description}" rows="3"
                                  placeholder="Brief description of this service type." maxlength="500"></textarea>
                    </div>
                    <div class="mb-0 bg-light p-3 rounded">
                        <div class="form-check form-switch d-flex align-items-center gap-2 m-0 p-0">
                            <label class="form-check-label fw-semibold" for="formActive">Status: Active</label>
                            <input class="form-check-input ms-auto m-0" type="checkbox" role="switch"
                                   th:field="*{isActive}" id="formActive" style="width: 2.5em; height: 1.2em;"/>
                        </div>
                        <div class="form-text small mt-2">Inactive types are hidden from new bookings.</div>
                    </div>
                </div>
                <div class="modal-footer border-0 px-4 pb-4">
                    <button type="button" class="btn btn-light px-4 rounded-pill" data-bs-dismiss="modal">Cancel
                    </button>
                    <button type="submit" class="btn text-white px-4 rounded-pill fw-bold"
                            style="background-color: #FFA54F;">Save
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
    (function () {
        const modal = document.getElementById('serviceTypeModal');
        if (!modal) return;
        const openModal = /*[[${openModal}]]*/ false;
        if (openModal) {
            new bootstrap.Modal(modal).show();
        }
        document.getElementById('btnAddNew').addEventListener('click', function () {
            document.getElementById('serviceTypeModalLabel').textContent = 'Add New Type';
            var fid = document.getElementById('formId');
            if (fid) fid.value = '';
            var ni = modal.querySelector('input[name="name"]');
            if (ni) ni.value = '';
            var di = modal.querySelector('textarea[name="description"]');
            if (di) di.value = '';
            var activeCheck = document.getElementById('formActive');
            if (activeCheck) activeCheck.checked = true;
        });
    })();
</script>
</body>
</html>
