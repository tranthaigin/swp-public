<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Services - Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <link rel="stylesheet" th:href="@{/css/admin-service.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar-admin.css}">


    <style>
        /* CSS chia bố cục: Sidebar trái, Content phải */
        body {
            margin: 0;
            overflow: hidden;
            background-color: #f8f9fa;
        }

        .admin-wrapper {
            display: flex;
            min-height: 100vh;
        }

        .admin-main-content {
            flex-grow: 1;
            padding: 2rem;
            height: 100vh;
            overflow-y: auto; /* Cuộn độc lập phần nội dung */
        }
    </style>
</head>
<body>

<div class="admin-wrapper">

    <div th:replace="~{fragments/sidebar-admin :: aside(activePage='service-list')}"></div>
    <div class="admin-main-content">

        <div class="d-flex align-items-center gap-2 mb-4">
            <a th:href="@{/admin/service-manager}" class="text-secondary text-decoration-none fw-medium">
                <i class="bi bi-arrow-left"></i> Back to Service Manager
            </a>
        </div>

        <div th:if="${message}" class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i><span th:text="${message}">Saved.</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show shadow-sm" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}">Error.</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4 bg-white p-3 shadow-sm rounded-3">
            <h3 class="fw-bold text-dark mb-0">Services List</h3>

            <div class="d-flex align-items-center gap-3 flex-wrap">
                <form th:action="@{/admin/services}" method="get"
                      class="d-flex align-items-center gap-2 bg-light px-3 py-1 rounded-pill border">
                    <i class="bi bi-funnel text-muted"></i>
                    <label class="form-label mb-0 small text-muted d-none d-sm-block">Filter:</label>
                    <select name="typeFilter"
                            class="form-select form-select-sm border-0 bg-transparent shadow-none fw-bold text-dark"
                            style="width: auto; outline: none;" onchange="this.form.submit()">
                        <option value="">All types</option>
                        <option th:each="t : ${serviceTypes}" th:value="${t.name}" th:text="${t.name}"
                                th:selected="${typeFilter != null && !#strings.isEmpty(typeFilter) && typeFilter == t.name}"></option>
                    </select>
                </form>

                <button type="button" class="btn text-white fw-bold px-4 rounded-pill shadow-sm"
                        style="background-color: #1a202c;" data-bs-toggle="modal" data-bs-target="#serviceModal"
                        id="btnAddNew">
                    <i class="bi bi-plus-lg me-1"></i> Add New Service
                </button>
            </div>
        </div>

        <div class="card border-0 shadow-sm rounded-3 overflow-hidden bg-white">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="text-uppercase small fw-bold" style="background-color: #f1f5f9; color: #64748b;">
                    <tr>
                        <th class="ps-4 py-3">#</th>
                        <th class="py-3">Type</th>
                        <th class="py-3">Name</th>
                        <th class="py-3">Description</th>
                        <th class="py-3">Price</th>
                        <th class="py-3">Duration</th>
                        <th class="py-3">Status</th>
                        <th class="text-end pe-4 py-3">Action</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="svc, iterStat : ${services}" class="border-bottom">
                        <td class="ps-4 fw-bold text-muted" th:text="${svc.id}">1</td>
                        <td><span class="badge bg-light text-dark border px-2 py-1"
                                  th:text="${svc.serviceType}">—</span></td>
                        <td><span class="fw-bold text-dark" th:text="${svc.name}">—</span></td>
                        <td><span class="text-muted small" th:text="${svc.description != null ? svc.description : '-'}">—</span>
                        </td>
