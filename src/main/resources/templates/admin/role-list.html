<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Role Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" th:href="@{/css/sidebar-admin.css}">
    <link rel="stylesheet" th:href="@{/css/role-list.css}">

    <style>
        /* CSS chia bố cục: Sidebar trái, Content phải */
        body {
            margin: 0;
            overflow: hidden;
            background-color: #f8f9fa;
        }

        .admin-wrapper {
            display: flex;
            min-height: 100vh;
        }

        .admin-main-content {
            flex-grow: 1;
            padding: 2rem;
            height: 100vh;
            overflow-y: auto; /* Cuộn độc lập phần nội dung bên phải */
        }
    </style>
</head>
<body>

<div class="admin-wrapper">

    <div th:replace="~{fragments/sidebar-admin :: aside(activePage='roles')}"></div>
    <div class="admin-main-content">
        <div class="container-fluid p-0">

            <div class="d-flex justify-content-between align-items-center mb-4 p-4 rounded-3 shadow-sm"
                 style="background-color: #ffedd8;">
                <div>
                    <h2 class="mb-1 fw-bold text-dark"><i class="bi bi-shield-lock-fill text-warning me-2"></i>Role
                        Management</h2>
                    <p class="text-secondary mb-0 small">Manage system roles and update access permissions.</p>
                </div>
            </div>

            <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show shadow-sm rounded-3"
                 role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <span th:if="${param.error[0] == 'RoleNotFound'}">Role not found! Please select a valid role.</span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show shadow-sm rounded-3"
                 role="alert">
                <i class="bi bi-check-circle-fill me-2"></i> <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <div class="card border-0 shadow-sm rounded-3 overflow-hidden bg-white">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead style="background-color: #f1f5f9; color: #64748b;" class="text-uppercase small fw-bold">
                        <tr>
                            <th scope="col" class="ps-4 py-3" style="width: 15%;">Role ID</th>
                            <th scope="col" class="py-3" style="width: 50%;">Role Name</th>
                            <th scope="col" class="text-end pe-4 py-3" style="width: 35%;">Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="role : ${roles}" class="border-bottom">
                            <td class="ps-4 fw-bold text-muted" th:text="'#ROLE-' + ${role.roleId}">#ROLE-1</td>

                            <td>
                                <span class="badge rounded-pill px-4 py-2 border shadow-sm"
                                      th:classappend="${role.roleName == 'Admin' ? 'bg-danger-subtle text-danger border-danger' :
                                                     (role.roleName == 'Manager' ? 'bg-info-subtle text-info border-info' : 'bg-warning-subtle text-warning-emphasis border-warning')}"
                                      th:text="${role.roleName}" style="font-size: 0.85rem;">ADMIN</span>
                            </td>

                            <td class="text-end pe-4">
                                <a th:href="@{/admin/roles/permissions/{id}(id=${role.roleId})}"
                                   class="btn btn-sm btn-outline-primary rounded-pill px-4 py-2 fw-bold shadow-sm">
                                    <i class="bi bi-key-fill me-1"></i> Manage Permissions
                                </a>
                            </td>
                        </tr>

                        <tr th:if="${#lists.isEmpty(roles)}">
                            <td colspan="3" class="text-center py-5">
                                <div class="empty-state text-muted">
                                    <i class="bi bi-shield-x fs-1 d-block mb-3 text-light"></i>
                                    <h5 class="fw-bold text-dark">No roles found</h5>
                                    <p class="small">There are no roles defined in the database yet.</p>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/role-list.js}"></script>

</body>
</html>
