<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet List (Staff View)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/pet-dashboard.css}">

    <style>
        .active-tab {
            color: #ea580c; /* orange-600 */
            border-bottom: 2px solid #ea580c;
        }
        .inactive-tab {
            color: #6b7280; /* gray-500 */
            border-bottom: 2px solid transparent;
        }
        .inactive-tab:hover {
            color: #374151; /* gray-700 */
            border-color: #d1d5db; /* gray-300 */
        }
    </style>

    <script th:src="@{/js/pet-dashboard.js}"></script>
</head>
<body class="bg-gray-50">

<div class="min-h-screen p-6">
    <div class="max-w-7xl mx-auto fade-in">

        <div class="flex justify-between items-center mb-6">
            <div>
                <h2 class="text-3xl font-extrabold text-gray-800">Pet Profiles</h2>
                <p class="text-sm text-gray-500 mt-1">View customer pets and shop inventory.</p>
            </div>
        </div>

        <div class="flex space-x-6 mb-6 border-b border-gray-200">
            <button onclick="switchView('shop')" id="btn-shop" class="pb-3 text-lg font-bold transition active-tab">
                <i class="fa-solid fa-store mr-2"></i> Shop Inventory
            </button>
            <button onclick="switchView('customer')" id="btn-customer" class="pb-3 text-lg font-bold transition inactive-tab">
                <i class="fa-solid fa-users mr-2"></i> Customer Pets
            </button>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-sm mb-8 flex flex-col md:flex-row gap-4 border border-gray-100">
            <div class="relative flex-1">
                <i class="fa-solid fa-search absolute left-4 top-3.5 text-gray-400"></i>
                <input type="text" placeholder="Search by pet name or owner name..." class="w-full pl-12 pr-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent transition">
            </div>
            <div class="flex gap-4">
                <select class="border border-gray-200 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-orange-500 text-gray-600 bg-white">
                    <option value="">All Statuses</option>
                    <option value="available">Available</option>
                    <option value="sold">Sold / Care</option>
                </select>
                <button class="bg-gray-100 hover:bg-gray-200 text-gray-600 px-4 py-3 rounded-lg transition"><i class="fa-solid fa-filter"></i></button>
            </div>
        </div>

        <div id="view-shop" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <div th:each="pet : ${shopPets}" class="bg-white rounded-2xl shadow-sm hover:shadow-lg transition duration-300 overflow-hidden border border-gray-100 group relative flex flex-col">

                <div class="absolute top-3 left-3 z-10 bg-green-600 text-white text-xs font-bold px-2 py-1 rounded backdrop-blur-sm shadow-sm">
                    For Sale
                </div>

                <div class="h-56 overflow-hidden relative bg-gray-100">
                    <img th:src="${pet.imageUrl}" class="w-full h-full object-cover group-hover:scale-105 transition duration-700" alt="Pet Image">
                </div>

                <div class="p-5 flex-1 flex flex-col">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <h3 class="text-xl font-bold text-gray-800" th:text="${pet.name}">Pet Name</h3>
                            <p class="text-sm text-gray-500 font-medium">
                                <span th:text="${pet.breed}">Breed</span> • <span th:text="${pet.ageMonths}">0</span> Months
                            </p>
                        </div>
                        <div class="w-8 h-8 rounded-full bg-orange-50 text-orange-500 flex items-center justify-center">
                            <i class="fa-solid fa-dog" th:if="${pet.petType == 'dog'}"></i>
                            <i class="fa-solid fa-cat" th:if="${pet.petType == 'cat'}"></i>
                        </div>
                    </div>

                    <div class="mt-auto pt-4 border-t border-gray-100 flex justify-between items-center">
                        <div class="flex items-center gap-2">
                            <span class="text-sm font-bold text-green-600" th:text="${#numbers.formatDecimal(pet.price, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</span>
                        </div>

                        <div class="flex gap-2 w-full justify-end">
                            <a th:href="@{/staff/pet/detail(id=${pet.id})}" class="px-4 py-2 rounded-lg bg-orange-50 hover:bg-orange-100 text-orange-600 text-sm font-bold transition flex items-center">
                                Detail <i class="fa-solid fa-arrow-right ml-1"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(shopPets)}" class="col-span-full text-center py-10 text-gray-400">
                <i class="fa-solid fa-box-open text-4xl mb-3"></i>
                <p>No pets available in shop inventory.</p>
            </div>
        </div>

        <div id="view-customer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 hidden">
            <div th:each="pet : ${customerPets}" class="bg-white rounded-2xl shadow-sm hover:shadow-lg transition duration-300 overflow-hidden border border-gray-100 group relative flex flex-col">

                <div class="absolute top-3 left-3 z-10 bg-gray-900/80 text-white text-xs font-bold px-2 py-1 rounded backdrop-blur-sm">
                    Owned
                </div>

                <div class="h-56 overflow-hidden relative bg-gray-100">
                    <img th:src="${pet.imageUrl}" class="w-full h-full object-cover group-hover:scale-105 transition duration-700" alt="Pet Image">
                </div>

                <div class="p-5 flex-1 flex flex-col">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <h3 class="text-xl font-bold text-gray-800" th:text="${pet.name}">Pet Name</h3>
                            <p class="text-sm text-gray-500 font-medium">
                                <span th:text="${pet.breed}">Breed</span> • <span th:text="${pet.ageMonths}">0</span> Months
                            </p>
                        </div>
                        <div class="w-8 h-8 rounded-full bg-orange-50 text-orange-500 flex items-center justify-center">
                            <i class="fa-solid fa-dog" th:if="${pet.petType == 'dog'}"></i>
                            <i class="fa-solid fa-cat" th:if="${pet.petType == 'cat'}"></i>
                        </div>
                    </div>

                    <div class="mt-auto pt-4 border-t border-gray-100 flex justify-between items-center">
                        <div class="flex items-center gap-2">
                            <div class="w-6 h-6 rounded-full bg-gray-200 text-gray-600 flex items-center justify-center text-xs font-bold">U</div>
                            <span class="text-xs text-gray-500 font-semibold truncate max-w-[100px]" th:text="${pet.owner.fullName}">Owner Name</span>
                        </div>

                        <div class="flex gap-2">
                            <a th:href="@{/staff/pet/history(id=${pet.id})}" class="w-8 h-8 rounded-full bg-gray-100 hover:bg-blue-100 text-gray-500 hover:text-blue-600 flex items-center justify-center transition" title="View History">
                                <i class="fa-solid fa-clock-rotate-left"></i>
                            </a>
                            <a th:href="@{/staff/pet/detail(id=${pet.id})}" class="px-3 py-1 rounded-lg bg-orange-50 hover:bg-orange-100 text-orange-600 text-xs font-bold transition flex items-center">
                                Detail
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(customerPets)}" class="col-span-full text-center py-10 text-gray-400">
                <i class="fa-solid fa-users-slash text-4xl mb-3"></i>
                <p>No customer pets found.</p>
            </div>
        </div>
    </div>
</div>

</body>
</html>
