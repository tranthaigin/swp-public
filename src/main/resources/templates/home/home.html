<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Pet World - Home</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.css"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <link rel="stylesheet" th:href="@{/css/home.css}"/>
    <link rel="stylesheet" th:href="@{/css/vendor.css}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Prata&display=swap"
          rel="stylesheet">
</head>
<body>

<svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
    <defs>
        <symbol id="arrow-right" viewBox="0 0 24 24">
            <path fill="currentColor"
                  d="M17.92 11.62a1 1 0 0 0-.21-.33l-5-5a1 1 0 0 0-1.42 1.42l3.3 3.29H7a1 1 0 0 0 0 2h7.59l-3.3 3.29a1 1 0 0 0 0 1.42a1 1 0 0 0 1.42 0l5-5a1 1 0 0 0 .21-.33a1 1 0 0 0 0-.76Z"/>
        </symbol>
    </defs>
</svg>

<div class="preloader-wrapper">
    <div class="preloader"></div>
</div>

<div th:replace="~{fragments/header-customer :: header(activePage='home')}"></div>

<section id="banner" style="background: #F9F3EC ;">
    <div class="container">
        <div class="swiper main-swiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide py-5">
                    <div class="row banner-content align-items-center">
                        <div class="img-wrapper col-md-5">
                            <img th:src="@{/images/banner-img.png}" class="img-fluid" alt="Banner">
                        </div>
                        <div class="content-wrapper col-md-7 p-5 mb-5">
                            <div class="secondary-font text-primary text-uppercase mb-4">Save 10 - 20 % off</div>
                            <h2 class="banner-title display-1 fw-normal">Best destination for <span
                                    class="text-primary">your pets</span></h2>
                            <div class="d-flex flex-wrap gap-3">
                                <a th:href="@{/appointment/booking}"
                                   class="btn btn-primary btn-lg text-uppercase fs-6 rounded-1">Book Service
                                    Appointment</a>
                                <a th:href="@{/shop/products}"
                                   class="btn btn-outline-dark btn-lg text-uppercase fs-6 rounded-1">Shop Now</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="swiper-pagination mb-5"></div>
        </div>
    </div>
</section>

<section id="clothing" class="my-5 overflow-hidden">
    <div class="container pb-5">
        <div class="section-header d-md-flex justify-content-between align-items-center mb-5">
            <h2 class="display-3 fw-normal">Products</h2>
            <a th:href="@{/shop/products}" class="btn btn-outline-dark btn-lg text-uppercase fs-6 rounded-1">Explore
                More</a>
        </div>
        <div class="products-carousel swiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide">
                    <div class="card product-card position-relative border-0 shadow-sm">
                        <div class="z-1 position-absolute top-0 start-0 m-3">
                            <span class="badge bg-white text-dark border shadow-sm px-3 py-2">New</span>
                        </div>
                        <img th:src="@{/images/item1.jpg}" class="img-fluid w-100 rounded-3" alt="Product">
                        <div class="card-body px-0">
                            <h5 class="product-title fw-bold">Grey Hoodie</h5>
                            <div class="d-flex align-items-center gap-2 mb-2">
                                <iconify-icon icon="clarity:star-solid" class="text-warning"></iconify-icon>
                                <span class="small">5.0 (125)</span>
                            </div>
                            <span class="product-price fw-bold" style="color: #FFA54F;">$18.00</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<section id="services-circle" class="my-5 py-5 overflow-hidden" style="background-color: #fdfdfd;">
    <div class="container text-center">
        <h2 class="display-5 mb-5">Our Professional Services</h2>
        <div class="row align-items-center">
            <div class="col-lg-4">
                <div class="service-item d-flex align-items-center justify-content-lg-end mb-5 text-lg-end flex-column-reverse flex-lg-row">
                    <div class="me-lg-4 mt-3 mt-lg-0">
                        <h5 class="fw-bold">Vaccination</h5>
                        <p class="small text-muted">High-quality vaccines and safe procedures.</p>
                    </div>
                    <div class="service-icon-box"
                         style="background: #FFA54F; color: white; padding: 15px; border-radius: 50%;">
                        <iconify-icon icon="mdi:needle" class="fs-3"></iconify-icon>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <img th:src="@{/images/logo-petshop.png}" alt="Logo" class="img-fluid mb-3" style="max-height: 150px;">
                <h2 style="color: #FFA54F; font-family: 'Prata', serif;">Pet World</h2>
            </div>
            <div class="col-lg-4">
                <div class="service-item d-flex align-items-center justify-content-lg-start mb-5 text-lg-start flex-column flex-lg-row">
                    <div class="service-icon-box"
                         style="background: #FFA54F; color: white; padding: 15px; border-radius: 50%;">
                        <iconify-icon icon="mdi:sparkles" class="fs-3"></iconify-icon>
                    </div>
                    <div class="ms-lg-4 mt-3 mt-lg-0">
                        <h5 class="fw-bold">Spa & Grooming</h5>
                        <p class="small text-muted">Professional bathing and grooming.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-1.11.0.min.js"></script>
<script th:src="@{/js/plugins.js}"></script>
<script th:src="@{/js/script.js}"></script>
<script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>

</body>
</html>
