<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta charset="utf-8" />
  <title>Order History</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <link rel="stylesheet" href="/css/order-history.css" />
  <link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<main class="order-history-design min-vh-100 d-flex flex-column">

  <section class="container-fluid py-4 px-lg-5 header-section">
    <div class="container-fluid">
      <h1 class="display-6 fw-bold mb-1">Order history</h1>
      <p class="text-muted mb-0">Manage and track your orders.</p>
    </div>
  </section>

  <section class="container-fluid px-lg-5 flex-grow-1 order-list-wrapper">
    <div class="container-fluid py-4">
      <div class="d-flex flex-column gap-3">

        <th:block th:each="ord : ${orderHistory}">

          <article class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-3 p-md-4">

              <a href="javascript:void(0)" class="text-decoration-none text-dark d-flex align-items-center justify-content-between"
                 data-bs-toggle="modal"
                 th:data-bs-target="'#orderModal-' + ${ord.orderID}">

                <div class="d-flex align-items-start gap-3 w-100">

                  <div class="d-flex align-items-center justify-content-center flex-shrink-0"
                       style="width: 56px; height: 56px; background-color: #EAEBE6; border-radius: 14px;">
                    <i class="bi bi-box-seam" style="font-size: 1.5rem; color: #7B7969;"></i>
                  </div>

                  <div class="flex-grow-1">
                    <div class="d-flex flex-wrap align-items-center gap-2 mb-2">
                      <h2 class="h5 fw-bold mb-0" th:text="${ord.getOrderCode()}"></h2>
                      <span class="badge bg-delivered text-dark" th:text="${ord.getStatus()}"></span>
                    </div>
                    <div class="d-flex flex-column flex-sm-row gap-sm-3 text-secondary mb-2 small">
                      <time th:datetime="${#temporals.format(ord.createdAt, 'yyyy-MM-dd')}"
                            th:text="${#temporals.format(ord.createdAt, 'dd/MM/yyyy')}">
                      </time>
                      <span>•</span>
                      <span th:text="${#aggregates.sum(ord.orderItems.![quantity])} + ' products'">3 sản phẩm</span>
                    </div>
                    <p class="h6 fw-bold text-price mb-0"
                       th:text="${#numbers.formatDecimal(ord.getTotalAmount(), 0, 'COMMA', 0, 'POINT')} + ' đ'">
                    </p>
                  </div>
                </div>

                <div class="arrow-icon ms-3">
                  <i class="bi bi-chevron-right text-muted"></i>
                </div>
              </a>
            </div>
          </article>

          <div class="modal fade" th:id="'orderModal-' + ${ord.orderID}" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
              <div class="modal-content border-0 shadow-sm" style="border-radius: 20px;">

                <div class="modal-header border-bottom-0 pb-0 px-4 pt-4">
                  <div>
                    <h5 class="modal-title fw-bold" th:text="${ord.getOrderCode()}"></h5>
                    <small class="text-muted" th:text="'Placed on: ' + ${#temporals.format(ord.createdAt, 'HH:mm dd/MM/yyyy')}"></small>
                  </div>
                  <button type="button" class="btn-close shadow-none" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <div class="modal-body p-4">
                  <div class="d-flex justify-content-between align-items-center mb-4">
                    <h6 class="fw-bold mb-0">Order Items</h6>
                    <span class="badge bg-delivered text-dark text-uppercase" th:text="${ord.getStatus()}"></span>
                  </div>

                  <ul class="list-group list-group-flush mb-4 border rounded-3 overflow-hidden">
                    <li class="list-group-item p-3" th:each="item : ${ord.orderItems}">
                      <div class="d-flex justify-content-between align-items-center">
                        <div class="d-flex gap-3 align-items-center">
                          <div class="bg-light rounded p-2 text-muted">
                            <i class="bi bi-box-seam" th:if="${item.petID == null}"></i>
                            <i class="bi bi-tencent-qq" th:if="${item.petID != null}"></i>
                          </div>
                          <div>
                            <div class="fw-bold mb-1" th:text="${item.itemName}"></div>
                            <small class="text-muted">
                              Qty: <span th:text="${item.quantity}"></span> ×
                              <span th:text="${#numbers.formatDecimal(item.unitPrice, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                            </small>
                          </div>
                        </div>
                        <div class="fw-bold text-dark"
                             th:text="${#numbers.formatDecimal(item.unitPrice * item.quantity, 0, 'COMMA', 0, 'POINT')} + ' đ'">
                        </div>
                      </div>
                    </li>
                  </ul>

                  <div class="row g-3">
                    <div class="col-sm-6">
                      <div class="p-3 rounded-3 h-100" style="background-color: #F8F9FA;">
                        <h6 class="fw-bold mb-2">Shipping Details</h6>
                        <div class="small">
                          <div class="fw-bold mb-1" th:text="${ord.shipName}"></div>
                          <div class="text-dark mb-1" th:text="${ord.shipPhone}"></div>
                          <div class="text-muted" th:text="${ord.shipAddress}"></div>
                        </div>
                      </div>
                    </div>

                    <div class="col-sm-6">
                      <div class="p-3 rounded-3 h-100 d-flex flex-column justify-content-center" style="background-color: #F8F9FA;">
                        <div class="d-flex justify-content-between mb-2 small text-muted">
                          <span>Subtotal</span>
                          <span th:text="${#numbers.formatDecimal(ord.subtotal != null ? ord.subtotal : 0, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                        </div>
                        <div class="d-flex justify-content-between border-bottom pb-2 mb-2 small text-muted">
                          <span>Shipping Fee</span>
                          <span th:text="${#numbers.formatDecimal(ord.shippingFee != null ? ord.shippingFee : 0, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                        </div>
                        <div class="d-flex justify-content-between fw-bold fs-6 mt-1">
                          <span>Total</span>
                          <span class="text-dark" th:text="${#numbers.formatDecimal(ord.getTotalAmount(), 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>

        </th:block>

      </div>
    </div>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
