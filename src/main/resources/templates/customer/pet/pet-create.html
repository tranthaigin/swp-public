<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout-customer :: layout(~{::content})}">
<head>
    <title>Register New Pet</title>
</head>
<section th:fragment="content">

    <script th:src="@{/js/pet-dashboard.js}"></script>

    <div class="max-w-3xl mx-auto py-10 px-4">

        <div class="mb-8 text-center">
            <h1 class="text-3xl font-extrabold text-gray-800">Register New Pet</h1>
            <p class="text-gray-500 mt-2">Add your furry friend to start tracking their health and booking services.</p>
        </div>

        <div class="bg-white rounded-2xl shadow-lg p-8 border border-gray-100">
            <form th:action="@{/customer/pet/pet-create}" th:object="${petDTO}" method="post" enctype="multipart/form-data" class="space-y-6">

                <div class="flex flex-col items-center justify-center mb-6">
                    <div class="w-32 h-32 rounded-full overflow-hidden bg-gray-100 border-2 border-dashed border-gray-300 relative group mb-3">
                        <img id="imagePreview" src="/images/default-pet.png" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition duration-300">
                            <i class="fa-solid fa-camera text-white text-2xl"></i>
                        </div>
                    </div>
                    <label for="imageFile" class="cursor-pointer bg-orange-50 text-orange-600 px-4 py-2 rounded-lg text-sm font-bold hover:bg-orange-100 transition">
                        Upload Photo
                    </label>
                    <input type="file" id="imageFile" th:field="*{imageFile}" class="hidden" accept="image/*" onchange="previewImage(this)">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Pet Name <span class="text-red-500">*</span></label>
                        <input type="text" th:field="*{name}" required class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-orange-500 focus:border-transparent outline-none transition" placeholder="e.g. Milo">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Species (Type)</label>
                        <select th:field="*{species}" class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-orange-500 outline-none bg-white">
                            <option value="Dog">Dog</option>
                            <option value="Cat">Cat</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Breed</label>
                        <input type="text" th:field="*{breed}" class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-orange-500 outline-none" placeholder="e.g. Golden Retriever">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Age (Months)</label>
                        <input type="number" th:field="*{age}" min="0" class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-orange-500 outline-none" placeholder="e.g. 12">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Gender</label>
                        <select th:field="*{gender}" class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-orange-500 outline-none bg-white">
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Weight (Kg)</label>
                        <input type="number" step="0.1" th:field="*{weightKg}" class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-orange-500 outline-none" placeholder="e.g. 5.5">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Color</label>
                        <input type="text" th:field="*{color}" class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-orange-500 outline-none" placeholder="e.g. Golden">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Health Notes / Allergies</label>
                    <textarea th:field="*{note}" rows="3" class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-orange-500 outline-none" placeholder="Any special needs or medical history..."></textarea>
                </div>

                <div class="flex items-center gap-4 mt-8 pt-6 border-t border-gray-100">
                    <a th:href="@{/customer/pet/my-pets}" class="w-1/3 text-center py-3 rounded-lg border border-gray-300 text-gray-600 font-bold hover:bg-gray-50 transition">Cancel</a>
                    <button type="submit" class="w-2/3 py-3 rounded-lg bg-orange-600 text-white font-bold hover:bg-orange-700 shadow-lg transition transform hover:-translate-y-0.5">
                        Complete Registration
                    </button>
                </div>
            </form>
        </div>
    </div>
</section>
</html>
