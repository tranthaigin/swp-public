<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout-customer :: layout(~{::content})}">
<head>
    <title>Update Pet Profile</title>
</head>
<section th:fragment="content">

    <script th:src="@{/js/pet-dashboard.js}"></script>

    <div class="max-w-3xl mx-auto py-10 px-4">

        <div class="flex items-center justify-between mb-8">
            <h1 class="text-3xl font-extrabold text-gray-800">Edit Profile</h1>
            <a th:href="@{/customer/pet/my-pets}" class="text-gray-500 hover:text-orange-600 font-bold transition">
                <i class="fa-solid fa-xmark mr-1"></i> Cancel
            </a>
        </div>

        <div class="bg-white rounded-2xl shadow-lg p-8 border border-gray-100">
            <form th:action="@{/customer/pet/pet-update}" th:object="${pet}" method="post" enctype="multipart/form-data" class="space-y-6">

                <input type="hidden" th:field="*{petID}">
                <input type="hidden" th:field="*{imageUrl}">

                <div class="flex items-center gap-6 mb-6">
                    <div class="w-24 h-24 rounded-full overflow-hidden bg-gray-100 border border-gray-200">
                        <img id="imagePreview" th:src="*{imageUrl != null ? imageUrl : '/images/default-pet.png'}" class="w-full h-full object-cover">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-1">Update Photo</label>
                        <input type="file" name="imageFile" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-orange-50 file:text-orange-700 hover:file:bg-orange-100" onchange="previewImage(this)">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Pet Name</label>
                        <input type="text" th:field="*{name}" class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-orange-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Breed</label>
                        <input type="text" th:field="*{breed}" class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-orange-500 outline-none" placeholder="e.g. Golden Retriever">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Age (Months)</label>
                        <input type="number" th:field="*{ageMonths}" class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-orange-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Weight (Kg)</label>
                        <input type="number" step="0.1" th:field="*{weightKg}" class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-orange-500 outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Species</label>
                        <select th:field="*{petType}" class="w-full px-4 py-3 rounded-lg border border-gray-200 bg-gray-50 focus:outline-none">
                            <option value="Dog">Dog</option>
                            <option value="Cat">Cat</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Color</label>
                        <input type="text" th:field="*{color}" class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-orange-500 outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Medical / Care Notes</label>
                    <textarea th:field="*{note}" rows="4" class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-orange-500 outline-none"></textarea>
                </div>

                <button type="submit" class="w-full py-3 rounded-lg bg-orange-600 text-white font-bold hover:bg-orange-700 shadow-lg transition">
                    Save Changes
                </button>
            </form>
        </div>
    </div>
</section>
</html>
