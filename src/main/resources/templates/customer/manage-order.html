<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/manage-order.css">
</head>
<body class="bg-light p-4">

<div class="container-fluid max-w-custom">
    <div class="header-card mb-4 p-4 rounded-4 d-flex justify-content-between align-items-center">
        <div>
            <h2 class="fw-bold mb-1 d-flex align-items-center">
                <i class="bi bi-box-seam text-warning me-3"></i> Orders Management
            </h2>
            <p class="text-muted mb-0 ms-5">Manage customer orders and transactions.</p>
        </div>

    </div>

    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body p-4">

            <div class="row mb-4 gx-3">
                <div class="col-md-5">
                    <div class="input-group search-group rounded-pill">
                        <span class="input-group-text bg-transparent border-end-0 pe-1 ps-3 text-muted">
                            <i class="bi bi-search"></i>
                        </span>
                        <input type="text" class="form-control bg-transparent border-start-0 shadow-none ps-2" placeholder="Search order by ID or customer...">
                    </div>
                </div>
                <div class="col-md-3">
                    <select class="form-select rounded-pill shadow-none text-muted filter-select">
                        <option selected>All Statuses</option>
                        <option value="pending">Pending</option>
                        <option value="processing">Processing</option>
                        <option value="completed">Completed</option>
                        <option value="cancelled">Cancelled</option>
                    </select>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table custom-table align-middle mb-0">
                    <thead>
                    <tr>
                        <th>ORDER ID</th>
                        <th>CUSTOMER NAME</th>
                        <th>DATE</th>
                        <th>STATUS</th>
                        <th>TOTAL</th>
                        <th class="text-end pe-4">ACTION</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr>
                        <td class="fw-bold text-dark">#ORD-1001</td>
                        <td class="fw-bold text-dark">Alice Smith</td>
                        <td class="text-muted">Oct 24, 2025</td>
                        <td>
                            <select class="form-select form-select-sm status-select status-completed border-0 shadow-none fw-semibold">
                                <option value="pending">Pending</option>
                                <option value="processing">Processing</option>
                                <option value="completed" selected>Completed</option>
                                <option value="cancelled">Cancelled</option>
                            </select>
                        </td>
                        <td class="text-muted">$145.50</td>
                        <td class="text-end pe-4">
                            <div class="btn-group shadow-sm rounded-pill overflow-hidden bg-white">
                                <a href="#" class="btn btn-sm btn-outline-secondary border-0 px-3">
                                    <i class="bi bi-pencil-square me-1"></i> Edit
                                </a>
                                <button type="button"
                                        class="btn btn-sm btn-outline-danger border-0 px-3"
                                        data-bs-toggle="modal"
                                        data-bs-target="#deleteConfirmationModal">
                                    <i class="bi bi-trash3 me-1"></i> Delete
                                </button>
                            </div>
                        </td>
                    </tr>


                    </tbody>
                </table>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const statusSelects = document.querySelectorAll('.status-select');

        statusSelects.forEach(select => {
            select.addEventListener('change', function() {
                // Xóa tất cả các class màu cũ
                this.classList.remove('status-pending', 'status-processing', 'status-completed', 'status-cancelled');

                // Thêm class màu mới tương ứng với option vừa chọn
                this.classList.add('status-' + this.value);
            });
        });
    });
</script>
</body>
</html>
