<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shopping Cart - PetWorld</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Arimo', sans-serif; background-color: #f89d35; }
        .cart-item-card { border-radius: 20px; transition: transform 0.2s; border: none; }
        .product-img { width: 90px; height: 90px; background-size: cover; background-position: center; border-radius: 12px; }
        .quantity-control input { width: 40px; text-align: center; border: 1px solid #dee2e6; border-radius: 8px; font-weight: bold; }
        .price-old { text-decoration: line-through; color: #adb5bd; font-size: 0.8rem; }
        .badge-vaccine { font-size: 0.75rem; color: #0d6efd; font-weight: 600; }
        .bg-summary { border-radius: 20px; background: white; }

        .payment-option { cursor: pointer; transition: all 0.2s; border: 1px solid #f1f1f1; }
        .payment-option:hover { border-color: #f89d35; background-color: #fff9f2; }
        .form-check-input:checked + .form-check-label { font-weight: bold; color: #f89d35; }

        /* Sidebar Shipping Card */
        .shipping-card-sidebar { background-color: #ffffff; border-radius: 20px; border: none; }
        .label-tiny { font-size: 0.65rem; font-weight: 700; color: #aaa; text-transform: uppercase; margin-bottom: 2px; display: block; }
        .input-sidebar { font-size: 0.8rem !important; border-radius: 10px !important; border: 1px solid #eee !important; background-color: #fcfcfc !important; }
        .input-sidebar:focus { border-color: #f89d35 !important; background-color: #ffffff !important; box-shadow: none !important; }

        .text-price-main { color: #f89d35; font-weight: 700; }
    </style>
</head>
<body>

<div class="container py-5">
    <div th:if="${errorMessage}" class="alert alert-warning alert-dismissible fade show border-0 shadow-sm mb-4" style="border-radius: 15px;" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="d-flex align-items-center gap-3 mb-4 text-dark">
        <i class="bi bi-cart3 fs-2"></i>
        <h1 class="h3 mb-0 fw-bold">Shopping Cart</h1>
        <span class="opacity-75 fs-5" th:text="'(' + ${cart != null && cart.items != null ? cart.items.size() : 0} + ' items)'"></span>
    </div>

    <form th:action="@{/cart/checkout}" method="post">
        <div class="row g-4">
            <div class="col-lg-8">
                <div th:if="${cart == null || cart.items == null || cart.items.isEmpty()}" class="card border-0 p-5 text-center shadow-sm" style="border-radius: 20px;">
                    <i class="bi bi-basket2 fs-1 text-secondary"></i>
                    <p class="mt-3 text-secondary">Your cart is currently empty.</p>
                    <a th:href="@{/product/productList}" class="btn btn-dark rounded-pill px-4">Shop Now</a>
                </div>

                <div th:if="${cart != null && cart.items != null}" th:each="item : ${cart.items}" class="card shadow-sm mb-3 cart-item-card">
                    <div class="card-body p-3">
                        <div class="row align-items-center">
                            <div class="col-auto">
                                <div class="product-img" th:style="'background-image: url(' + (${item.pet != null ? item.pet.imageUrl : item.product.imageUrl}) + ');'"></div>
                            </div>
                            <div class="col">
                                <h5 class="fw-bold mb-0 small" th:text="${item.pet != null ? item.pet.name : item.product.name}">Name</h5>
                                <div th:if="${item.pet != null}" class="badge-vaccine mt-1 d-flex align-items-center gap-1">
                                    <i class="bi bi-patch-check-fill"></i> Vaccinated
                                </div>
                            </div>
                            <div class="col-auto">
                                <div th:if="${item.product != null}" class="quantity-control d-flex align-items-center">
                                    <a th:href="@{/cart/update/{id}(id=${item.cartItemId}, action='decrease')}" class="btn btn-sm btn-light border" th:style="${item.quantity <= 1 ? 'pointer-events: none; opacity: 0.5;' : ''}"><i class="bi bi-dash"></i></a>
                                    <input type="text" th:value="${item.quantity}" readonly class="mx-1">
                                    <a th:href="@{/cart/update/{id}(id=${item.cartItemId}, action='increase')}" class="btn btn-sm btn-light border"><i class="bi bi-plus"></i></a>
                                </div>
                                <span th:if="${item.pet != null}" class="badge bg-warning text-dark px-2 py-1 fw-bold" style="font-size: 0.7rem;"><i class="bi bi-info-circle me-1"></i>Limit 1</span>
                            </div>
                            <div class="col-auto text-end" style="min-width: 130px;">
                                <a th:href="@{/cart/remove/{id}(id=${item.cartItemId})}" class="text-danger mb-2 d-inline-block" onclick="return confirm('Are you sure?');">
                                    <i class="bi bi-trash3"></i>
                                </a>
                                <div th:with="target=${item.pet != null ? item.pet : item.product}">
                                    <div th:if="${target.salePrice != null && target.salePrice < target.price}">
                                        <div class="price-old" th:text="${#numbers.formatDecimal(target.price * item.quantity, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></div>
                                        <div class="h6 fw-bold text-dark mb-0" th:text="${#numbers.formatDecimal(target.salePrice * item.quantity, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></div>
                                    </div>
                                    <div th:unless="${target.salePrice != null && target.salePrice < target.price}">
                                        <div class="h6 fw-bold text-dark mb-0" th:text="${#numbers.formatDecimal(target.price * item.quantity, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card shadow-sm mb-3 shipping-card-sidebar">
                    <div class="card-body p-4">
                        <h6 class="fw-bold mb-3"><i class="bi bi-truck me-2 text-primary"></i>Shipping Details</h6>
                        <div class="row g-2">
                            <div class="col-12">
                                <label class="label-tiny">Recipient's Name</label>
                                <input type="text" class="form-control form-control-sm input-sidebar" name="shipName" th:value="${customer != null ? customer.fullName : ''}" required>
                            </div>
                            <div class="col-12">
                                <label class="label-tiny">Phone Number</label>
                                <input type="tel" class="form-control form-control-sm input-sidebar" name="shipPhone" th:value="${customer != null ? customer.phone : ''}" required>
                            </div>
                            <div class="col-12">
                                <label class="label-tiny">Address</label>
                                <input type="text" class="form-control form-control-sm input-sidebar" name="shipAddress" required>
                            </div>
                            <div class="col-12">
                                <label class="label-tiny">Order Note</label>
                                <input type="text" class="form-control form-control-sm input-sidebar" name="note">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card border-0 shadow-sm bg-summary p-2">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-4">Order Summary</h5>
                        <div class="d-flex justify-content-between mb-2 small">
                            <span class="text-secondary">Subtotal</span>
                            <span class="fw-bold text-dark" th:text="${subtotal != null ? #numbers.formatDecimal(subtotal, 0, 'COMMA', 0, 'POINT') + ' ₫' : '0 ₫'}"></span>
                        </div>
                        <div class="d-flex justify-content-between mb-2 small">
                            <span class="text-secondary">Shipping Fee</span>
                            <span class="fw-bold text-success" th:text="${shippingfree != null ? '+ ' + #numbers.formatDecimal(shippingfree, 0, 'COMMA', 0, 'POINT') + ' ₫' : '+ 25,000 ₫'}"></span>
                        </div>

                        <hr class="my-3 opacity-25">

                        <h6 class="fw-bold mb-3 small text-uppercase" style="letter-spacing: 1px;">Payment Method</h6>
                        <div class="payment-methods mb-4">
                            <div class="form-check payment-option rounded-3 p-2 mb-2 d-flex align-items-center">
                                <input class="form-check-input ms-0 me-3" type="radio" name="paymentMethod" id="momo" value="MOMO" checked>
                                <label class="form-check-label d-flex align-items-center gap-2 w-100" for="momo">
                                    <i class="bi bi-wallet2 text-primary"></i> <span class="small">MoMo Wallet</span>
                                </label>
                            </div>
                            <div class="form-check payment-option rounded-3 p-2 d-flex align-items-center">
                                <input class="form-check-input ms-0 me-3" type="radio" name="paymentMethod" id="cod" value="COD">
                                <label class="form-check-label d-flex align-items-center gap-2 w-100" for="cod">
                                    <i class="bi bi-cash-stack text-success"></i> <span class="small">Cash on Delivery</span>
                                </label>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between mb-4">
                            <span class="fw-bold fs-5 text-dark">Total</span>
                            <span class="fw-bold fs-4 text-dark" th:text="${total != null ? #numbers.formatDecimal(total, 0, 'COMMA', 0, 'POINT') + ' ₫' : '0 ₫'}"></span>
                        </div>

                        <button type="submit" class="btn btn-dark w-100 py-3 rounded-3 fw-bold shadow-sm">Proceed to Checkout</button>
                        <a th:href="@{/product/productList}" class="btn btn-link w-100 text-secondary text-decoration-none small mt-2 text-center d-block">Continue Shopping</a>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
