<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Pet World - E-commerce</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
</head>
<body>

<div th:replace="~{fragments/header-customer :: header(activePage='shop-pets')}"></div>

<div class="pet-world-container">

    <nav class="pw-filter-bar mt-3">
        <div class="container-fluid px-lg-5 d-flex flex-wrap justify-content-between align-items-center gap-3">
            <div class="d-flex gap-2">
                <button class="pw-btn-filter active">All</button>
                <button class="pw-btn-filter">Type <i class="bi bi-chevron-down"></i></button>
                <button class="pw-btn-filter">Price <i class="bi bi-chevron-down"></i></button>
            </div>

            <form th:action="@{/pets}" method="get" class="pw-search-form" style="min-width: 320px;">
                <div class="input-group shadow-sm">
                    <span class="input-group-text bg-white border-end-0" style="border-radius: 50px 0 0 50px;">
                        <i class="bi bi-search text-muted"></i>
                    </span>
                    <input type="text" id="kw" name="kw" th:value="${param.kw}"
                           class="form-control border-start-0 ps-0 shadow-none"
                           placeholder="Search pets..." style="height: 42px;">
                    <button class="btn px-4 text-white fw-bold" type="submit"
                            style="background-color: #FFA54F; border-color: #FFA54F; border-radius: 0 50px 50px 0;">
                        Search
                    </button>
                </div>
            </form>
        </div>
    </nav>

    <main class="container-fluid px-lg-5 py-4">
        <div class="pw-product-heading mb-4">
            <h2>Pet</h2>
            <span class="text-secondary" th:text="${#lists.size(pet)} + ' pets found'">8 products found</span>
        </div>

        <div class="row g-4 row-cols-2 row-cols-sm-3 row-cols-md-4 row-cols-lg-5">

            <div class="col" th:each="p : ${pet}" th:if="${p.price != null and p.owner == null}" >
                <div class="pw-card">
                    <div class="pw-img-box">
                        <img th:src="${p.imageUrl}" alt="Product Image">
                    </div>
                    <div class="pw-card-body">

                        <p class="pw-product-name mb-1">
                            <i class="bi bi-patch-check-fill text-primary me-1" style="font-size: 0.9rem;"></i>
                            <span th:text="${p.name}">Pet Name</span>
                        </p>
                        <div class="pw-vaccine-info mb-3" style="font-size: 0.85rem;">
                            <span th:if="${p.vaccinations != null and !p.vaccinations.isEmpty()}"
                                  class="text-success fw-medium">
                                <i class="bi bi-shield-check-fill"></i> Vaccinated
                            </span>
                            <span th:unless="${p.vaccinations != null and !p.vaccinations.isEmpty()}"
                                  class="text-muted">
                                <i class="bi bi-shield-x"></i> Not Vaccinated
                            </span>
                        </div>

                        <div class="pw-price-row mb-2">

                            <div th:if="${p.discountPercent != null and p.discountPercent > 0}">
                                <div class="d-flex align-items-center gap-2 mb-1">
                                    <span class="pw-price fw-bold" style="color: #FFB25B; font-size: 1.1rem;"
                                          th:text="${#numbers.formatDecimal(p.salePrice, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                                    <span class="badge bg-danger-subtle text-danger rounded-pill"
                                          style="font-size: 0.75rem;"
                                          th:text="'-' + ${p.discountPercent} + '%'"></span>
                                </div>
                                <del class="text-muted small" style="font-size: 0.85rem;"
                                     th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></del>
                            </div>

                            <div th:unless="${p.discountPercent != null and p.discountPercent > 0}">
                                <span class="pw-price fw-bold text-dark" style="font-size: 1.1rem;"
                                      th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                            </div>

                        </div>
                        <div class="pw-action-buttons mt-3">
                            <a th:href="@{'/cart/add-pet/' + ${p.id}}" class="pw-btn-add text-decoration-none">
                                <i class="bi bi-cart-plus"></i>
                                <span>ADD</span>
                            </a>

                            <a th:href="@{'/pet/detail/' + ${p.id}}" class="pw-btn-detail">
                                <i class="bi bi-eye"></i> Detail
                            </a>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
