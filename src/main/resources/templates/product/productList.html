<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Pet World - Products</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Prata&display=swap"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<div class="pet-world-container">

    <div th:replace="~{fragments/header-customer :: header(activePage='shop-products')}"></div>

    <nav class="pw-filter-bar mt-3">
        <div class="container-fluid px-lg-5 d-flex flex-wrap justify-content-between align-items-center gap-3">

            <div class="d-flex gap-2">
                <button class="pw-btn-filter active">All</button>
                <button class="pw-btn-filter">Type <i class="bi bi-chevron-down"></i></button>
                <button class="pw-btn-filter">Price <i class="bi bi-chevron-down"></i></button>
            </div>

            <form th:action="@{/products}" method="get" class="pw-search-form" style="min-width: 320px;">
                <div class="input-group shadow-sm">
                    <span class="input-group-text bg-white border-end-0" style="border-radius: 50px 0 0 50px;">
                        <i class="bi bi-search text-muted"></i>
                    </span>
                    <input type="text" id="kw" name="kw" th:value="${param.kw}"
                           class="form-control border-start-0 ps-0 shadow-none"
                           placeholder="Search products..." style="height: 42px;">
                    <button class="btn px-4 text-white fw-bold" type="submit"
                            style="background-color: #FFA54F; border-color: #FFA54F; border-radius: 0 50px 50px 0;">
                        Search
                    </button>
                </div>
            </form>
        </div>
    </nav>

    <main class="container-fluid px-lg-5 py-4">
        <div class="pw-product-heading mb-4">
            <h2>Products</h2>
            <span class="text-secondary" th:text="${#lists.size(product)} + ' products found'">0 products found</span>
        </div>

        <div class="row g-4 row-cols-2 row-cols-sm-3 row-cols-md-4 row-cols-lg-5">
            <div class="col" th:each="p : ${product}">
                <div class="pw-card">
                    <div class="pw-img-box">
                        <img th:src="${p.imageUrl}" alt="Product Image">
                    </div>

                    <div class="pw-card-body">
                        <p class="pw-product-name">
                            <i class="bi bi-patch-check-fill text-primary me-1"></i>
                            <span th:text="${p.name}">Product Name</span>
                        </p>

                        <div class="pw-price-row">
                            <div th:if="${p.discountPercent != null and p.discountPercent > 0}">
                                <div class="d-flex align-items-center gap-2 mb-1">
                                    <span class="pw-price fw-bold" style="color: #FFB25B; font-size: 1.1rem;"
                                          th:text="${#numbers.formatDecimal(p.salePrice, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                                    <span class="badge bg-danger-subtle text-danger rounded-pill"
                                          style="font-size: 0.75rem;"
                                          th:text="'-' + ${p.discountPercent} + '%'"></span>
                                </div>
                                <del class="text-muted small" style="font-size: 0.85rem;"
                                     th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></del>
                            </div>

                            <div th:unless="${p.discountPercent != null and p.discountPercent > 0}">
                                <span class="pw-price fw-bold text-dark" style="font-size: 1.1rem;"
                                      th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                            </div>
                        </div>

                        <div class="pw-stock-info ms-auto mb-2">
                            <div class="d-flex align-items-center gap-1 text-muted"
                                 style="font-size: 0.75rem; line-height: 1;">
                                <i class="bi bi-box-seam" style="font-size: 0.7rem;"></i>
                                <span th:if="${p.stock > 0}">Stock: <strong class="text-dark"
                                                                            th:text="${p.stock}">6</strong></span>
                                <span th:unless="${p.stock > 0}"><strong
                                        class="text-danger">Out of stock</strong></span>
                            </div>
                        </div>

                        <div class="pw-action-buttons">
                            <a th:if="${p.stock > 0}" th:href="@{'/cart/add-product/' + ${p.productId}}"
                               class="pw-btn-add text-decoration-none">
                                <i class="bi bi-cart-plus"></i>
                                <span>ADD</span>
                            </a>

                            <button th:unless="${p.stock > 0}" class="pw-btn-add border-0 bg-secondary text-white"
                                    style="cursor: not-allowed; opacity: 0.6;" disabled>
                                <i class="bi bi-cart-x"></i>
                                <span>SOLD OUT</span>
                            </button>

                            <a th:href="@{'/product/detail/' + ${p.productId}}" class="pw-btn-detail"><i
                                    class="bi bi-eye"></i> Detail</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<div class="modal fade" id="searchResultModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content shadow-lg border-0" style="border-radius: 20px;">
            <div class="modal-body text-center p-5">
                <i class="bi bi-search mb-3" style="font-size: 3rem; color: #ff914d; display: block;"></i>
                <h4 class="mb-3" style="font-weight: 400; color: #333;">Product Not Found</h4>
                <p class="text-muted mb-4" style="font-weight: 300;">
                    Sorry, we couldn't find any products matching your search.
                </p>
                <div class="d-flex justify-content-center">
                    <a th:href="@{/products}" class="btn btn-dark rounded-pill px-5"
                       style="font-weight: 300 !important; height: 45px; display: flex; align-items: center; justify-content: center; letter-spacing: 0.5px;">
                        OK
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>

<th:block th:if="${product != null && product.isEmpty()}">
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var myModalElement = document.getElementById('searchResultModal');
            if (myModalElement) {
                var myModal = new bootstrap.Modal(myModalElement);
                myModal.show();
            }
        });
    </script>
</th:block>

</body>
</html>
