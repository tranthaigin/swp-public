<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Detail - Compact View</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/pet-detail.css}"/>
</head>
<body class="product-page-body">

<main class="product-card-container">
    <div class="row g-0">

        <div class="col-lg-5 col-md-12">
            <div class="image-section-wrapper">
                <a th:href="@{'/pets'}" class="back-button">
                    <i class="bi bi-arrow-left"></i>
                    <span>back to list</span>
                </a>
                <img th:src="${petDetail.imageUrl}" alt="Pet Image" class="main-product-image">
            </div>
        </div>

        <div class="col-lg-7 col-md-12 content-section-wrapper">
            <article class="product-info-article">
                <header class="product-header">
                    <h1 class="display-5 fw-bold" th:text="${petDetail.name}">Bo</h1>

                    <div class="info-row">
                        <div class="icon-box"><i class="bi bi-tag" style="color: #ea5455;"></i></div>
                        <span class="label-text">Breed:</span>
                        <span class="ms-2 fw-bold text-muted" th:text="${petDetail.breed}">Breed Name</span>
                    </div>

                    <div class="info-row">
                        <div class="icon-box"><i class="bi bi-gender-ambiguous" style="color: #ea5455;"></i></div>
                        <span class="label-text">Gender:</span>
                        <span class="ms-2 fw-bold text-muted" th:text="${petDetail.gender}">Gender</span>
                    </div>

                    <div class="info-row">
                        <div class="icon-box"><i class="bi bi-speedometer2" style="color: #ea5455;"></i></div>
                        <span class="label-text">Weight:</span>
                        <span class="ms-2 fw-bold text-muted"
                              th:text="${petDetail.weightKg != null ? petDetail.weightKg + ' kg' : 'N/A'}"></span>
                    </div>

                    <div class="info-row">
                        <div class="icon-box"><i class="bi bi-calendar3" style="color: #ea5455;"></i></div>
                        <span class="label-text">Age:</span>
                        <span class="ms-2 fw-bold text-muted"
                              th:text="${petDetail.ageMonths != null ? petDetail.ageMonths + ' months' : 'N/A'}">0 months</span>
                    </div>

                    <div class="info-row">
                        <div class="icon-box"><i class="bi bi-shield-plus" style="color: #ea5455;"></i></div>
                        <span class="label-text">Vaccine:</span>

                        <span th:if="${petDetail.vaccinations != null and !petDetail.vaccinations.isEmpty()}"
                              class="ms-2 fw-bold text-success">
                            <i class="bi bi-shield-check-fill"></i> Vaccinated
                            <span class="fw-normal text-muted" style="font-size: 0.9em;"
                                  th:text="'(' + ${#lists.size(petDetail.vaccinations)} + ' doses)'"></span>
                        </span>

                        <span th:unless="${petDetail.vaccinations != null and !petDetail.vaccinations.isEmpty()}"
                              class="ms-2 fw-bold text-danger">
                            Not Vaccinated
                        </span>
                    </div>
                </header>

                <div class="info-row description-box align-items-start">
                    <div class="icon-box"><i class="bi bi-file-text" style="color: #ea5455;"></i></div>
                    <span class="label-text">Description:</span>
                    <span class="ms-2 text-secondary description-text" th:text="${petDetail.description}"></span>
                </div>

                <div class="thumbnail-preview">
                    <img class="img-thumb active" th:src="${petDetail.imageUrl}" alt="Thumbnail"/>
                </div>

                <div class="price-details-stack">
                    <div class="info-row">
                        <div class="icon-box"><i class="bi bi-tags-fill" style="color: #ff9f43;"></i></div>
                        <span class="label-text">Price:</span>

                        <div th:if="${petDetail.discountPercent != null and petDetail.discountPercent > 0}"
                             class="ms-2">
            <span class="value-text price-color fw-bold"
                  th:text="${#numbers.formatDecimal(petDetail.salePrice, 0, 'COMMA', 0, 'POINT')} + ' đ'">450,000 đ</span>

                            <del class="text-muted small ms-2"
                                 th:text="${#numbers.formatDecimal(petDetail.price, 0, 'COMMA', 0, 'POINT')} + ' đ'">
                                500,000 đ
                            </del>
                        </div>

                        <span th:unless="${petDetail.discountPercent != null and petDetail.discountPercent > 0}"
                              class="ms-2 value-text price-color"
                              th:text="${#numbers.formatDecimal(petDetail.price, 0, 'COMMA', 0, 'POINT')} + ' đ'">500,000 đ</span>
                    </div>

                    <div class="info-row">
                        <div class="icon-box"><i class="bi bi-percent" style="color: #ea5455;"></i></div>
                        <span class="label-text">Sale:</span>
                        <span class="ms-2 badge badge-sale-custom"
                              th:classappend="${petDetail.discountPercent > 0} ? 'bg-danger' : 'bg-secondary'"
                              th:text="${petDetail.discountPercent != null ? petDetail.discountPercent + '%' : '0%'}">0%</span>
                    </div>
                </div>

                <a th:href="@{'/cart/add-pet/' + ${petDetail.id}}"
                   class="btn btn-add-to-cart text-decoration-none d-inline-block text-center">
                    <i class="bi bi-cart-plus me-2"></i> ADD TO CART
                </a>


            </article>
        </div>

    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
