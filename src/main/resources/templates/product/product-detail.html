<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/product-detail.css}" />
</head>
<body class="product-page-body">

<main class="product-card-container">
    <div class="row g-0">

        <div class="col-lg-5 col-md-12">
            <div class="image-section-wrapper">
                <a th:href="@{'/products'}" class="back-button">
                    <i class="bi bi-arrow-left"></i>
                    <span>back to list</span>
                </a>
                <img th:src="${proDetail.imageUrl}" alt="Product Image" class="main-product-image">
            </div>
        </div>

        <div class="col-lg-7 col-md-12 content-section-wrapper">
            <article class="product-info-article">
                <header class="product-header">
                    <h1 class="display-5 fw-bold" th:text="${proDetail.name}">Product Name</h1>
                </header>

                <section class="description-box mt-4">
                    <h6 class="fw-bold text-dark text-uppercase">Description:</h6>
                    <p class="text-secondary description-text" th:text="${proDetail.description}">
                        Product description goes here...
                    </p>
                </section>

                <div class="thumbnail-preview my-4">
                    <img class="img-thumb active" th:src="${proDetail.imageUrl}" alt="Thumbnail" />
                </div>

                <div class="price-details-stack">
                    <div class="info-row">
                        <div class="icon-box"><i class="bi bi-box-seam" style="color: #28c76f;"></i></div>
                        <span class="label-text">Stock:</span>
                        <span class="value-text text-dark" th:text="${proDetail.stock}">6</span>
                    </div>

                    <div class="info-row">
                        <div class="icon-box"><i class="bi bi-tags-fill" style="color: #ff9f43;"></i></div>
                        <span class="label-text">Price:</span>

                        <div th:if="${proDetail.discountPercent != null and proDetail.discountPercent > 0}" class="ms-2">
                            <span class="value-text price-color fw-bold"
                                  th:text="${#numbers.formatDecimal(proDetail.salePrice, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                            <del class="text-muted small ms-2"
                                 th:text="${#numbers.formatDecimal(proDetail.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></del>
                        </div>
                        <span th:unless="${proDetail.discountPercent != null and proDetail.discountPercent > 0}"
                              class="ms-2 value-text price-color"
                              th:text="${#numbers.formatDecimal(proDetail.price, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
                    </div>

                    <div class="info-row">
                        <div class="icon-box"><i class="bi bi-percent" style="color: #ea5455;"></i></div>
                        <span class="label-text">Sale:</span>
                        <span class="ms-2 badge badge-sale-custom"
                              th:text="${proDetail.discountPercent != null ? proDetail.discountPercent + '%' : '0%'}">0%</span>
                    </div>
                </div>

                <div class="integrated-action-bar">
                    <div class="quantity-selector">
                        <label class="fw-bold text-muted me-3">Qty:</label>
                        <div class="d-flex align-items-center">
                            <button type="button" class="btn-qty" onclick="changeQty(-1)">-</button>
                            <input type="number" id="quantityInput" class="input-qty" value="1" min="1" readonly />
                            <button type="button" class="btn-qty" onclick="changeQty(1)">+</button>
                        </div>
                    </div>

                    <button type="button" class="btn-add-to-cart"
                            th:onclick="'addToCart(' + ${proDetail.productId} + ')'">
                        <i class="bi bi-cart-plus me-2"></i> ADD TO CART
                    </button>
                </div>
            </article>
        </div>

    </div>
</main>

<script th:inline="javascript">
    // 1. Xử lý tăng giảm số lượng
    function changeQty(amount) {
        const input = document.getElementById('quantityInput');
        let currentVal = parseInt(input.value);
        if (!isNaN(currentVal)) {
            let newVal = currentVal + amount;
            if (newVal >= 1) input.value = newVal;
        }
    }

    // 2. Hàm điều hướng thêm vào giỏ hàng với số lượng thực tế
    function addToCart(productId) {
        const qty = document.getElementById('quantityInput').value;
        window.location.href = '/cart/add-product/' + productId + '?qty=' + qty;
    }
</script>
</body>
</html>
